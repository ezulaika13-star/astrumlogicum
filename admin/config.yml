backend:
  name: github
  repo: ezulaika13-star/astrumlogicum
branch: main
media_folder: "images"
public_folder: "/images"
collections:
  - name: "essays"
    label: "Essays"
    folder: "essays"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}